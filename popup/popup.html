<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Heat</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>X Heat</h1>
          <p>帖子热度徽章</p>
        </div>
        <label class="switch" title="启用或关闭热度徽章">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <section class="score">
        <span class="score__label">计算方式</span>
        <p>徽章综合每小时速度、最近加速度、互动质量和当前页面排名。</p>
      </section>

      <section class="legend">
        <div><span class="dot dot--cold"></span>🧊 冷</div>
        <div><span class="dot dot--cool"></span>🌡️ 升温</div>
        <div><span class="dot dot--warm"></span>🔥 热</div>
        <div><span class="dot dot--hot"></span>🔥 很热</div>
        <div><span class="dot dot--viral"></span>🚀 爆发</div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
